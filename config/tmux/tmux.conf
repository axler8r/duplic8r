# modified settings
set     -g prefix                       C-a
set     -s escape-time                  1
set     -g base-index                   1
setw    -g pane-base-index              1
setw    -g mode-keys                    vi

# modified key bindings
unbind  C-?
bind    ?       list-keys
unbind  C-c
bind    c       new-window
unbind  C-r
bind    r       source-file ~/.tmux.conf \; display-message "Reloaded configuration!"
unbind  [
bind    Escape  copy-mode
unbind  %
unbind  |
bind    |       split-window -h
unbind  '"'
unbind  -
bind    -       split-window -v -d
bind    h       select-pane -L
bind    j       select-pane -D
bind    k       select-pane -U
bind    l       select-pane -R
bind    H       resize-pane -L 5
bind    J       resize-pane -D 3
bind    K       resize-pane -U 3
bind    L       resize-pane -R 5
unbind  E
bind    E       set-window-option synchronize-panes on
unbind  e
bind    e       set-window-option synchronize-panes off
unbind  p
bind    p       paste-buffer

# colors
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "screen-256color"

# status line
run-shell "powerline-daemon -q"
source "/Library/Python/3.7/site-packages/powerline/bindings/tmux/powerline.conf"
